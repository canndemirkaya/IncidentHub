name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps
        run: |
          cd IncidentHub.API && npm ci
          cd ../IncidentHub.UI && npm ci
      - name: Run API tests
        run: |
          cd IncidentHub.API && npm test --if-present
      - name: Run UI tests
        run: |
          cd IncidentHub.UI && npm test --if-present

  build-and-push-images:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: IncidentHub.API/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/incidenthub-api:latest
      - name: Build and push UI image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: IncidentHub.UI/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/incidenthub-ui:latest
